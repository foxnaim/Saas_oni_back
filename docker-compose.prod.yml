# Production stack — health checks, restart policies, bind-mounted DB volume
# Usage: docker compose -f docker-compose.prod.yml up -d

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: sayless-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sayless
      # Uncomment to enable auth:
      # MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      # MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      # Persistent bind-mount on the host — ensure /srv/sayless/mongo exists
      - /srv/sayless/mongo:/data/db
    networks:
      - sayless-network-prod
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sayless-redis-prod
    restart: always
    ports:
      - "127.0.0.1:6379:6379"   # bind to loopback only in prod
    volumes:
      - /srv/sayless/redis:/data
    networks:
      - sayless-network-prod
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sayless-backend-prod
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${PORT:-3001}
      MONGODB_URI: mongodb://mongodb:27017/sayless
      REDIS_URL: redis://redis:6379
      # If MongoDB auth is enabled:
      # MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/sayless?authSource=admin
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    networks:
      - sayless-network-prod
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  sayless-network-prod:
    driver: bridge
