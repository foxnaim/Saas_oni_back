services:

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sayless-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
    depends_on:
      mongodb:
        condition: service_started
        required: false   # Atlas or external URI — MongoDB container is optional
    volumes:
      - ./logs:/app/logs
    networks:
      - sayless-network

  # ── MongoDB (opt-in: --profile local-db) ──────────────────────────────────
  mongodb:
    image: mongo:7
    container_name: sayless-mongodb
    restart: unless-stopped
    profiles:
      - local-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: sayless
    volumes:
      - mongodb_data:/data/db
    networks:
      - sayless-network

  # ── Redis (opt-in: --profile cache) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sayless-redis
    restart: unless-stopped
    profiles:
      - cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - sayless-network

volumes:
  mongodb_data:
  redis_data:

networks:
  sayless-network:
    driver: bridge
